name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

env:
  CONFIGURATION: Release

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install dependencies
        run: dotnet tool restore && dotnet restore

      - name: Build
        run: |
          dotnet build --no-restore \
          -c ${{ env.CONFIGURATION }} \
          -p:RepositoryUrl=${{ github.repositoryUrl }}

      - name: Run tests
        run: |
          dotnet test --no-restore --no-build \
          -c ${{ env.CONFIGURATION }} \
          -p:RepositoryUrl=${{ github.repositoryUrl }}

      - name: Pack
        run: dotnet pack --no-restore --no-build -o ./packages

      - name: Publish packages
        if: (github.ref == 'refs/heads/main')
        run: dotnet nuget push ${{ github.workspace }}/packages/**/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate
